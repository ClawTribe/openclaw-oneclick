name: Multi-Platform Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build for ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            artifact_name: Windows-x64
          - os: macos-latest
            arch: x64
            artifact_name: macOS-x64
          - os: macos-14
            arch: arm64
            artifact_name: macOS-arm64
          - os: ubuntu-latest
            arch: x64
            artifact_name: Linux-x64

    steps:
      - name: Checkout One-Click Wrapper
        uses: actions/checkout@v4
        with:
          path: wrapper

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Setup pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm --version

      - name: Download & Extract Official OpenClaw Core
        shell: bash
        run: |
          mkdir core
          curl -L "https://github.com/openclaw/openclaw/archive/v2026.2.26.tar.gz" | tar -xz -C core --strip-components=1
          
      - name: Prep Setup Console (openclaw-setup)
        shell: bash
        run: |
          cd wrapper
          echo "node-linker=hoisted" >> .npmrc
          pnpm install --no-frozen-lockfile
          pnpm prune --prod
          rm -rf .git .github
          cd ..

      - name: Install Dependencies for Core (Full)
        shell: bash
        run: |
          cd core
          echo "node-linker=hoisted" >> .npmrc
          pnpm install --no-frozen-lockfile
        env:
          NPM_CONFIG_NODE_LLAMA_CPP_SKIP_BUILD: false

      - name: Build Core (Compile TypeScript → dist/)
        shell: bash
        run: |
          cd core
          npm run build

      - name: Prune Core Dev Dependencies
        shell: bash
        run: |
          cd core
          pnpm prune --prod

      - name: Aggressive Pruning (Cleanup)
        shell: bash
        run: |
          cd core
          # 移除通用非代码文件
          rm -rf .git .github .gitignore README.md LICENSE package-lock.json
          find ./node_modules -type d \( -name "test" -o -name "tests" -o -name "docs" -o -name "samples" -o -name "examples" -o -name ".github" -o -name ".vscode" \) -exec rm -rf {} + || true
          find ./node_modules -type f \( -name "*.md" -o -name "*.map" -o -name "*.obj" -o -name "*.pdb" -o -name "*.o" \) -delete || true
          
          # 核心瘦身：剔除原生模块中非当前平台的二进制 (koffi, sharp 等)
          # 我们根据当前构建目标的操作系统，反向删除其他系统的预编译库
          if [[ "${{ matrix.artifact_name }}" == *"Windows"* ]]; then
              echo "➤ 正在清理非 Windows 架构的原生依赖..."
              find ./node_modules -type d -name "*linux*" -exec rm -rf {} + || true
              find ./node_modules -type d -name "*darwin*" -exec rm -rf {} + || true
              find ./node_modules -type d -name "*android*" -exec rm -rf {} + || true
          elif [[ "${{ matrix.artifact_name }}" == *"macOS"* ]]; then
              echo "➤ 正在清理非 macOS 架构的原生依赖..."
              find ./node_modules -type d -name "*linux*" -exec rm -rf {} + || true
              find ./node_modules -type d -name "*win32*" -exec rm -rf {} + || true
              find ./node_modules -type d -name "*android*" -exec rm -rf {} + || true
          elif [[ "${{ matrix.artifact_name }}" == *"Linux"* ]]; then
              echo "➤ 正在清理非 Linux 架构的原生依赖..."
              find ./node_modules -type d -name "*win32*" -exec rm -rf {} + || true
              find ./node_modules -type d -name "*darwin*" -exec rm -rf {} + || true
              find ./node_modules -type d -name "*android*" -exec rm -rf {} + || true
          fi
          cd ..
          
      - name: Assemble Release Bundle
        shell: bash
        run: |
          mkdir release_bundle
          # 将官方核心直接铺在打包根目录
          mv core/* core/.[!.]* release_bundle/ 2>/dev/null || true
          # 将我们的一键面板放入独立的寄生伴随目录
          mv wrapper release_bundle/openclaw_oneclick

      - name: Create Zip Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd release_bundle
          $zipName = "OpenClaw-${{ matrix.artifact_name }}.zip"
          Compress-Archive -Path * -DestinationPath "../$zipName" -CompressionLevel Optimal

      - name: Create Zip Package (macOS & Linux)
        if: matrix.os != 'windows-latest'
        run: |
          cd release_bundle
          zip -9 -r "../OpenClaw-${{ matrix.artifact_name }}.zip" ./*

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: OpenClaw-${{ matrix.artifact_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
