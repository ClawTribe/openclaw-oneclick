name: Multi-Platform Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build for ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
            artifact_name: Windows-x64
          - os: macos-latest # Intel 芯片
            arch: x64
            artifact_name: macOS-x64
          - os: macos-14     # Apple M1/M2 芯片
            arch: arm64
            artifact_name: macOS-arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 锁定到 OpenClaw 推荐的 v22

      - name: Install Dependencies
        # 这一步是核心：GitHub 虚拟机会在这里完成 node-llama-cpp 等 C++ 依赖的编译
        run: npm install --production
        env:
          # 强制从预编译下载，减少 GitHub Actions 的耗时
          NPM_CONFIG_NODE_LLAMA_CPP_SKIP_BUILD: false

      - name: Cleanup Unnecessary Files
        # 移除 .git 和测试文件，减小分发包体积
        shell: bash
        run: |
          rm -rf .git .github
          find . -name "*.md" -type f -delete
          find . -name "*.txt" -type f -delete || true

      - name: Create Zip Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path . -DestinationPath "OpenClaw-${{ matrix.artifact_name }}.zip"

      - name: Create Zip Package (macOS)
        if: matrix.os != 'windows-latest'
        run: |
          zip -r "OpenClaw-${{ matrix.artifact_name }}.zip" .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: OpenClaw-${{ matrix.artifact_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
