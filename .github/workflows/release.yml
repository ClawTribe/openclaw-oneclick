name: Multi-Platform Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      core_version:
        description: 'OpenClaw Core 版本 (留空则自动获取最新)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            artifact_name: Windows-x64
          - os: macos-latest
            arch: x64
            artifact_name: macOS-x64
          - os: macos-14
            arch: arm64
            artifact_name: macOS-arm64
          - os: ubuntu-latest
            arch: x64
            artifact_name: Linux-x64

    steps:
      - name: Checkout One-Click Wrapper
        uses: actions/checkout@v4
        with:
          path: wrapper

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Setup pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm --version

      - name: Resolve Latest OpenClaw Core Version
        id: resolve_version
        shell: bash
        run: |
          # 如果手动触发时指定了版本，使用指定版本；否则自动获取最新 release
          if [ -n "${{ github.event.inputs.core_version }}" ]; then
            CORE_VER="${{ github.event.inputs.core_version }}"
          else
            CORE_VER=$(curl -sfSL https://api.github.com/repos/openclaw/openclaw/releases/latest | jq -r '.tag_name')
          fi
          if [ -z "$CORE_VER" ] || [ "$CORE_VER" = "null" ]; then
            echo "❌ 无法获取 OpenClaw Core 最新版本"
            exit 1
          fi
          echo "core_version=${CORE_VER}" >> "$GITHUB_OUTPUT"
          echo "📦 Using OpenClaw Core version: ${CORE_VER}"

      - name: Download & Extract Official OpenClaw Core
        shell: bash
        run: |
          CORE_VER="${{ steps.resolve_version.outputs.core_version }}"
          mkdir core
          curl -fSL "https://github.com/openclaw/openclaw/archive/${CORE_VER}.tar.gz" | tar -xz -C core --strip-components=1
          
      - name: Prep Setup Console (openclaw-setup)
        shell: bash
        run: |
          cd wrapper
          echo "node-linker=hoisted" >> .npmrc
          pnpm install --no-frozen-lockfile
          pnpm prune --prod
          rm -rf .git .github
          cd ..

      - name: Install Dependencies for Core (Full)
        shell: bash
        run: |
          cd core
          echo "node-linker=hoisted" >> .npmrc
          pnpm install --no-frozen-lockfile
        env:
          NPM_CONFIG_NODE_LLAMA_CPP_SKIP_BUILD: false

      - name: Build Core (Compile TypeScript → dist/)
        shell: bash
        run: |
          cd core
          npm run build

      - name: Build Control UI (dist/control-ui/)
        shell: bash
        run: |
          cd core
          pnpm ui:build

      - name: Prune Core Dev Dependencies
        shell: bash
        run: |
          cd core
          pnpm prune --prod

      - name: Cleanup UI Build Dependencies
        shell: bash
        run: |
          rm -rf core/ui/node_modules

      - name: Aggressive Pruning (Cleanup)
        shell: bash
        run: |
          cd core
          # 移除通用非代码文件
          rm -rf .git .github .gitignore README.md LICENSE package-lock.json
          find ./node_modules -type d \( -name "test" -o -name "tests" -o -name "docs" -o -name "samples" -o -name "examples" -o -name ".github" -o -name ".vscode" \) -exec rm -rf {} + || true
          find ./node_modules -type f \( -name "*.md" -o -name "*.map" -o -name "*.obj" -o -name "*.pdb" -o -name "*.o" \) -delete || true
          
          # 核心瘦身：剔除原生模块中非当前平台的二进制 (koffi, sharp 等)
          if [[ "${{ matrix.artifact_name }}" == *"Windows"* ]]; then
              find ./node_modules -type d -name "*linux*" -exec rm -rf {} + || true
              find ./node_modules -type d -name "*darwin*" -exec rm -rf {} + || true
              find ./node_modules -type d -name "*android*" -exec rm -rf {} + || true
          elif [[ "${{ matrix.artifact_name }}" == *"macOS"* ]]; then
              find ./node_modules -type d -name "*linux*" -exec rm -rf {} + || true
              find ./node_modules -type d -name "*win32*" -exec rm -rf {} + || true
              find ./node_modules -type d -name "*android*" -exec rm -rf {} + || true
          elif [[ "${{ matrix.artifact_name }}" == *"Linux"* ]]; then
              find ./node_modules -type d -name "*win32*" -exec rm -rf {} + || true
              find ./node_modules -type d -name "*darwin*" -exec rm -rf {} + || true
              find ./node_modules -type d -name "*android*" -exec rm -rf {} + || true
          fi
          cd ..
          
      - name: Assemble Release Bundle
        shell: bash
        run: |
          mkdir release_bundle
          mv core/* core/.[!.]* release_bundle/ 2>/dev/null || true
          mv wrapper release_bundle/openclaw_oneclick

      - name: Create Zip Package
        shell: bash
        run: |
          cd release_bundle
          zip_name="OpenClaw-${{ matrix.artifact_name }}.zip"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
              # 改用 7z，速度比 Compress-Archive 快 20 倍
              7z a -tzip "../$zip_name" ./*
          else
              zip -9 -r "../$zip_name" ./*
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: OpenClaw-${{ matrix.artifact_name }}.zip
          retention-days: 1

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_bins
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: all_bins/OpenClaw-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
