name: Multi-Platform Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build for ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            artifact_name: Windows-x64
          - os: macos-latest
            arch: x64
            artifact_name: macOS-x64
          - os: macos-14
            arch: arm64
            artifact_name: macOS-arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install --production
        env:
          NPM_CONFIG_NODE_LLAMA_CPP_SKIP_BUILD: false

      - name: Aggressive Pruning (Cleanup)
        shell: bash
        run: |
          # 核心代码与依赖清理
          rm -rf .git .github .gitignore README.md LICENSE package-lock.json
          
          # 深度清理 node_modules 中的非运行必要文件 (docs, tests, samples 等)
          echo "Starting aggressive pruning of node_modules..."
          find ./node_modules -type d \( -name "test" -o -name "tests" -o -name "docs" -o -name "samples" -o -name "examples" -o -name ".github" -o -name ".vscode" -o -name ".circleci" \) -exec rm -rf {} + || true
          find ./node_modules -type f \( -name "*.md" -o -name "*.ts" -o -name "*.map" -o -name "*.obj" -o -name "*.pdb" -o -name "*.o" -o -name "Makefile" -o -name "binding.sln" -o -name "*.vcxproj*" \) -delete || true
          
          # 清理 node-llama-cpp 等编译残留
          find ./node_modules -name "build" -type d -exec find {} -name "*.o" -delete \; || true
          
          echo "Pruning complete."

      - name: Create Zip Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $zipName = "OpenClaw-${{ matrix.artifact_name }}.zip"
          # 使用更可靠的文件获取方式
          $items = Get-ChildItem -Path . -Exclude $zipName
          Compress-Archive -Path $items -DestinationPath $zipName -CompressionLevel Optimal

      - name: Create Zip Package (macOS)
        if: matrix.os != 'windows-latest'
        run: |
          zip -9 -r "OpenClaw-${{ matrix.artifact_name }}.zip" ./* -x "OpenClaw-*.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: OpenClaw-${{ matrix.artifact_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
