name: Multi-Platform Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build for ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            artifact_name: Windows-x64
          - os: macos-latest
            arch: x64
            artifact_name: macOS-x64
          - os: macos-14
            arch: arm64
            artifact_name: macOS-arm64
          - os: ubuntu-latest
            arch: x64
            artifact_name: Linux-x64

    steps:
      - name: Checkout One-Click Wrapper
        uses: actions/checkout@v4
        with:
          path: wrapper

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Setup pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm --version

      - name: Download & Extract Official OpenClaw Core
        shell: bash
        run: |
          mkdir core
          curl -L "https://github.com/openclaw/openclaw/archive/v2026.2.26.tar.gz" | tar -xz -C core --strip-components=1
          
      - name: Integration (Merge Wrapper into Core)
        shell: bash
        run: |
          # 将一键管理控制台的代码注入到核心包中
          cp -r wrapper/src core/console_src
          cp wrapper/package.json core/package_oneclick.json
          
          # 更新核心包的 package.json:
          #   1. 添加 openclaw-setup 的 bin 入口
          #   2. 注入 wrapper 的 enquirer 依赖（openclaw-setup 运行时需要）
          cd core
          node -e '
            const pkg = require("./package.json");
            const wrapperPkg = require("./package_oneclick.json");
            pkg.bin = { ...pkg.bin, "openclaw-setup": "./console_src/index.js" };
            pkg.dependencies = { ...pkg.dependencies, ...wrapperPkg.dependencies };
            const fs = require("fs");
            fs.writeFileSync("./package.json", JSON.stringify(pkg, null, 2));
          '

      - name: Install Dependencies (Full - includes dev tools for build)
        shell: bash
        run: |
          cd core
          echo "node-linker=hoisted" >> .npmrc
          pnpm install --no-frozen-lockfile
        env:
          NPM_CONFIG_NODE_LLAMA_CPP_SKIP_BUILD: false

      - name: Build Core (Compile TypeScript → dist/)
        shell: bash
        run: |
          cd core
          npm run build

      - name: Prune Dev Dependencies
        shell: bash
        run: |
          cd core
          pnpm prune --prod

      - name: Aggressive Pruning (Cleanup)
        shell: bash
        run: |
          cd core
          # 清理不必要文件，减小体积
          rm -rf .git .github .gitignore README.md LICENSE package-lock.json package_oneclick.json
          find ./node_modules -type d \( -name "test" -o -name "tests" -o -name "docs" -o -name "samples" -o -name "examples" -o -name ".github" -o -name ".vscode" \) -exec rm -rf {} + || true
          find ./node_modules -type f \( -name "*.md" -o -name "*.map" -o -name "*.obj" -o -name "*.pdb" -o -name "*.o" \) -delete || true

      - name: Create Zip Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd core
          $zipName = "OpenClaw-${{ matrix.artifact_name }}.zip"
          Compress-Archive -Path * -DestinationPath "../$zipName" -CompressionLevel Optimal

      - name: Create Zip Package (macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd core
          zip -9 -r "../OpenClaw-${{ matrix.artifact_name }}.zip" ./*

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: OpenClaw-${{ matrix.artifact_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
